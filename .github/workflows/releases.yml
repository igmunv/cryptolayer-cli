name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: cryptolayer-cli
            archive_ext: linux-amd64.tar.gz
          - os: windows-latest
            artifact_name: cryptolayer-cli.exe
            archive_ext: windows-amd64.zip

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- СБОРКА ДЛЯ LINUX (через Docker для совместимости glibc) ---
      - name: Build Linux binary in Docker
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src python:3.13-bullseye bash -c "\
            pip install --upgrade pip && \
            pip install pyinstaller -r requirements.txt -r src/modules/common_requirements.txt && \
            python3 src/modules/generate_reqs.py && \
            python3 src/modules/generate_hidden_imports.py && \
            COLLECT_FLAGS=\$(cat src/modules/pyinstaller_flags.txt) && \
            pyinstaller --onefile \
              --add-data \"src/modules:modules\" \
              \$COLLECT_FLAGS \
              --name ${{ matrix.artifact_name }} \
              src/cryptolayer_cli.py"

      # --- СБОРКА ДЛЯ WINDOWS (как и было) ---
      - name: Set up Python
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build Windows binary
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt -r src/modules/common_requirements.txt
          python3 src/modules/generate_reqs.py
          python3 src/modules/generate_hidden_imports.py
          COLLECT_FLAGS=$(cat src/modules/pyinstaller_flags.txt)
          pyinstaller --onefile --add-data "src/modules:modules" $COLLECT_FLAGS --name ${{ matrix.artifact_name }} src/cryptolayer_cli.py

      # --- ФИНИШНАЯ ОБРАБОТКА (ОБЩАЯ) ---
      - name: Create Release Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          ARCHIVE_NAME="cryptolayer-cli-${{ github.ref_name }}-${{ matrix.archive_ext }}"
          DIR_NAME="CryptoLayerCLI-${{ github.ref_name }}"
          mkdir -p "dist/${DIR_NAME}"
          mv "dist/${{ matrix.artifact_name }}" "dist/${DIR_NAME}/"
          cp "src/wc_dict.json" "dist/${DIR_NAME}/"
          tar -czf "${ARCHIVE_NAME}" -C dist "${DIR_NAME}"
          # Перемещаем архив в папку dist для дальнейшей загрузки
          mkdir -p dist_final && mv "${ARCHIVE_NAME}" dist_final/

      - name: Create Release Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ArchiveName = "cryptolayer-cli-${{ github.ref_name }}-${{ matrix.archive_ext }}"
          $DirName = "CryptoLayerCLI-${{ github.ref_name }}"
          New-Item -ItemType Directory -Force -Path "dist/$DirName"
          Move-Item -Path "dist/${{ matrix.artifact_name }}" -Destination "dist/$DirName/"
          Copy-Item -Path "src/wc_dict.json" -Destination "dist/$DirName/"
          Compress-Archive -Path "dist/$DirName" -DestinationPath "dist/$ArchiveName" -Force

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist_final/*
            dist/*linux-amd64.tar.gz
            dist/*windows-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
