name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: cryptolayer-cli
            archive_ext: linux-amd64.tar.gz
          - os: windows-latest
            artifact_name: cryptolayer-cli.exe
            archive_ext: windows-amd64.zip

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Prepare dependencies and build
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          
          python3 src/modules/generate_reqs.py
          
          pip install -r src/modules/common_requirements.txt
          pip install -r requirements.txt

          python3 src/modules/generate_hidden_imports.py

          COLLECT_FLAGS=$(cat src/modules/pyinstaller_flags.txt)
          
          pyinstaller --onefile \
            --add-data "src/modules:modules" \
            $COLLECT_FLAGS \
            --name ${{ matrix.artifact_name }} \
            src/cryptolayer_cli.py

      # --- СБОРКА АРХИВА ДЛЯ LINUX ---
      - name: Create Release Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          ARCHIVE_NAME="cryptolayer-cli-${{ github.ref_name }}-${{ matrix.archive_ext }}"
          DIR_NAME="CryptoLayerCLI-${{ github.ref_name }}"
          
          mkdir -p "dist/${DIR_NAME}"
          mv "dist/${{ matrix.artifact_name }}" "dist/${DIR_NAME}/"
          cp "src/wc_dict.json" "dist/${DIR_NAME}/"
          
          cd dist
          tar -czf "${ARCHIVE_NAME}" "${DIR_NAME}"
          rm -rf "${DIR_NAME}"

      # --- СБОРКА АРХИВА ДЛЯ WINDOWS (через родной PowerShell) ---
      - name: Create Release Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ArchiveName = "cryptolayer-cli-${{ github.ref_name }}-${{ matrix.archive_ext }}"
          $DirName = "CryptoLayerCLI-${{ github.ref_name }}"
          
          # Создаем внутреннюю папку структуры
          New-Item -ItemType Directory -Force -Path "dist/$DirName"
          
          # Перемещаем бинарник и копируем JSON
          Move-Item -Path "dist/${{ matrix.artifact_name }}" -Destination "dist/$DirName/"
          Copy-Item -Path "src/wc_dict.json" -Destination "dist/$DirName/"
          
          # Пакуем через системный Compress-Archive
          Compress-Archive -Path "dist/$DirName" -DestinationPath "dist/$ArchiveName" -Force
          
          # Чистим временную папку
          Remove-Item -Recurse -Force -Path "dist/$DirName"

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/cryptolayer-cli-${{ github.ref_name }}-${{ matrix.archive_ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
