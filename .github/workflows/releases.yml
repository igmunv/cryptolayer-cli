name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: cryptolayer_cli
            asset_name: cryptolayer-linux-amd64
          - os: windows-latest
            artifact_name: cryptolayer_cli.exe
            asset_name: cryptolayer-windows-amd64.exe

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Prepare dependencies and build
        shell: bash
        run: |

          python -m pip install --upgrade pip
          pip install pyinstaller
          
          python3 src/modules/generate_reqs.py
          
          pip install -r src/modules/common_requirements.txt
          pip install -r requirements.txt

          python3 src/modules/generate_hidden_imports.py

          COLLECT_FLAGS=$(cat src/modules/pyinstaller_flags.txt)
          
          pyinstaller --onefile \
            --add-data "src/modules:modules" \
            $COLLECT_FLAGS \
            --name ${{ matrix.artifact_name }} \
            src/cryptolayer_cli.py

      - name: Rename artifacts
        shell: bash
        run: |
          mkdir -p dist
          mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
